services:
  postgres:
    build:
      context: .
      dockerfile: db.Dockerfile
    container_name: db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app-network

  auth_service:
    build:
      context: ../
      dockerfile: docker/auth_service.Dockerfile
    container_name: auth_service
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/api/health')\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../services/auth_service/app:/app/app
    restart: unless-stopped
    networks:
      - app-network
  
  rate_service:
    build:
      context: ../
      dockerfile: docker/rate_service.Dockerfile
    container_name: rate_service
    ports:
      - "8001:8001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/v1/reviews/health')\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      auth_service:
        condition: service_healthy
    volumes:
      - ../services/rate_service/app:/app/app
    restart: unless-stopped
    networks:
      - app-network

  survey_service:
    build:
      context: ../
      dockerfile: docker/survey_service.Dockerfile
    container_name: survey_service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://postgres:main0000@postgres:5432/postgres
      - AUTH_SERVICE_URL=http://auth_service:8000
      - PORT=8002
    depends_on:
      auth_service:
        condition: service_started
      postgres:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
