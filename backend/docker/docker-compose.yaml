version: '3.8'

services:
  postgres:
    build:
      context: .
      dockerfile: db.Dockerfile
    container_name: db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  auth_service:
    build:
      context: ../
      dockerfile: docker/auth_service.Dockerfile
    container_name: auth_service
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - ../services/auth_service/app:/app/app
    restart: unless-stopped
    networks:
      - app-network
  
  rate_service:
    build:
      context: ../
      dockerfile: docker/rate_service.Dockerfile
    container_name: rate_service
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - ../services/rate_service/app:/app/app
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge